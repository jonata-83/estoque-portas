<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>EstoqueMadeira</title>
<style>
  :root {
    --bg:#1a1610;--bg2:#241e14;--bg3:#1e1a12;
    --text:#e8dcc8;--text2:#9c8a6e;
    --accent:#c8a96e;--accent2:#a07840;
    --border:#c8a96e22;--border2:#c8a96e44;
    --card-bg:#241e14;--input-bg:#1a1610;--danger:#e05050;
  }
  .theme-claro{--bg:#f2ece0;--bg2:#e8dfc8;--bg3:#ede5d0;--text:#2a1f10;--text2:#7a6a50;--accent:#8b5e2a;--accent2:#6a4010;--border:#8b5e2a22;--border2:#8b5e2a44;--card-bg:#e8dfc8;--input-bg:#f2ece0;--danger:#cc2222}
  .theme-floresta{--bg:#0d1a0f;--bg2:#122018;--bg3:#0f1c12;--text:#c8e8d0;--text2:#6a9870;--accent:#4eb86a;--accent2:#2a8a48;--border:#4eb86a22;--border2:#4eb86a44;--card-bg:#122018;--input-bg:#0d1a0f;--danger:#e05050}
  .theme-noturno{--bg:#0a0a14;--bg2:#12121e;--bg3:#0e0e18;--text:#c8d0e8;--text2:#6878a8;--accent:#6e8ac8;--accent2:#4a66a8;--border:#6e8ac822;--border2:#6e8ac844;--card-bg:#12121e;--input-bg:#0a0a14;--danger:#e05050}

  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:Georgia,serif;min-height:100vh;overflow-y:auto;-webkit-overflow-scrolling:touch;transition:background .3s,color .3s}

  header{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 14px;position:sticky;top:0;z-index:20;transition:transform .3s,background .3s}
  header.hidden{transform:translateY(-100%)}
  .header-inner{max-width:680px;margin:0 auto;display:flex;align-items:center;gap:10px}
  .header-name{font-size:18px;color:var(--text);font-weight:bold;flex:1}
  #btnVoltar{background:color-mix(in srgb,var(--accent) 15%,transparent);border:1px solid var(--border2);color:var(--accent);border-radius:8px;padding:6px 12px;cursor:pointer;font-size:14px;font-family:Georgia,serif;display:none;align-items:center;gap:4px;flex-shrink:0}
  #btnVoltar.show{display:flex}
  #btnTema{background:transparent;border:1px solid var(--border2);color:var(--text2);border-radius:8px;padding:6px 10px;cursor:pointer;font-size:16px;flex-shrink:0}

  #temaPanel{position:fixed;top:56px;right:14px;z-index:100;background:var(--bg2);border:1px solid var(--border2);border-radius:14px;padding:10px;display:none;flex-direction:column;gap:6px;box-shadow:0 8px 32px #00000060;min-width:160px}
  #temaPanel.show{display:flex}
  .tema-opt{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;cursor:pointer;font-size:14px;color:var(--text);border:1px solid transparent}
  .tema-opt:hover{background:color-mix(in srgb,var(--accent) 12%,transparent)}
  .tema-opt.active{border-color:var(--accent);color:var(--accent)}
  .tema-dot{width:16px;height:16px;border-radius:50%;flex-shrink:0}

  main{max-width:680px;margin:0 auto;padding:14px 14px 120px}
  .section{display:none}
  .section.active{display:block}


  /* HOME NOVO */
  .home-totais{display:flex;gap:12px;margin-bottom:18px;padding:14px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:14px}
  .home-total-item{flex:1;text-align:center}
  .home-total-emoji{font-size:22px;display:block;margin-bottom:4px}
  .home-total-num{font-size:26px;font-weight:900;color:var(--accent);display:block;line-height:1}
  .home-total-label{font-size:10px;color:var(--text2);letter-spacing:1px;text-transform:uppercase}
  .home-total-div{width:1px;background:var(--border);align-self:stretch}

  .marc-card{border:1px solid;border-radius:14px;padding:16px 14px;cursor:pointer;transition:transform .15s,box-shadow .15s;position:relative;user-select:none;-webkit-user-select:none}
  .marc-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px #00000040}
  .marc-card.pressing{opacity:0.7}
  .marc-nome{font-size:17px;color:var(--text);font-weight:bold;margin-bottom:10px}
  .marc-stats{display:flex;gap:8px;align-items:center}
  .marc-stat{display:flex;align-items:center;gap:5px;font-size:14px;color:var(--text2)}
  .marc-stat strong{font-size:16px;font-weight:900;color:var(--accent)}
  /* HOME */
  .section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
  .section-title{font-size:17px;color:var(--accent);letter-spacing:1px}
  .btn-add-home{background:var(--accent);color:#1a1610;border:none;border-radius:8px;padding:8px 16px;cursor:pointer;font-weight:bold;font-size:13px;font-family:Georgia,serif}
  .add-card{background:var(--card-bg);border:1px solid var(--border2);border-radius:12px;padding:14px;margin-bottom:18px;display:none;gap:10px;flex-wrap:wrap;align-items:center}
  .add-card.show{display:flex}
  .input-inline{background:var(--input-bg);border:1px solid var(--border2);border-radius:8px;padding:10px 14px;color:var(--text);font-size:15px;flex:1;min-width:160px;font-family:Georgia,serif;outline:none}
  .btn-confirm{background:var(--accent);color:#1a1610;border:none;border-radius:8px;padding:10px 18px;cursor:pointer;font-weight:bold;font-family:Georgia,serif}
  .btn-cancel{background:transparent;color:var(--text2);border:1px solid var(--border2);border-radius:8px;padding:10px 14px;cursor:pointer;font-family:Georgia,serif}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
  .card{border:1px solid;border-radius:16px;padding:18px;cursor:pointer;transition:transform .15s,box-shadow .15s}
  .card:hover{transform:translateY(-3px);box-shadow:0 8px 24px #00000040}
  .card-top{display:flex;justify-content:space-between;align-items:flex-start}
  .avatar{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:bold;color:#1a1610}
  .btn-trash{background:transparent;border:none;cursor:pointer;color:var(--text2);padding:4px;border-radius:6px;font-size:17px}
  .card-name{margin:12px 0 8px;font-size:15px;color:var(--text);font-weight:bold}
  .card-stats{display:flex;flex-wrap:wrap;gap:6px}
  .badge{border-radius:6px;padding:3px 8px;font-size:12px}


  .hist-emoji{font-size:15px;flex-shrink:0;cursor:pointer;padding:0 8px;line-height:1;user-select:none;-webkit-user-select:none;opacity:0.85;transition:opacity .2s;border-right:1px solid var(--border);align-self:stretch;display:flex;align-items:center;justify-content:center}
  .hist-emoji:hover{opacity:1}
  .filtro-ativo{font-size:11px;color:var(--accent);letter-spacing:1px;margin-bottom:8px;display:flex;align-items:center;gap:8px}
  .btn-limpar-filtro{background:transparent;border:1px solid var(--border2);color:var(--text2);border-radius:6px;padding:2px 8px;font-size:11px;cursor:pointer;font-family:Georgia,serif}
  /* HISTÓRICO */
  .hist-title{font-size:11px;color:var(--accent);letter-spacing:1.5px;margin:0 0 10px;text-transform:uppercase}
  .hist-list{display:flex;flex-direction:column;gap:7px}
  .hist-item{background:var(--card-bg);border:1px solid var(--border);border-radius:10px;display:flex;align-items:stretch;position:relative;overflow:hidden;transition:background .15s,border-color .15s}
  .hist-item.drag-over{border-color:var(--accent);border-style:dashed}
  .hist-item.dragging{opacity:.4}
  .hist-body{flex:1;display:flex;align-items:center;justify-content:space-between;padding:13px 0 13px 14px;gap:10px;cursor:pointer;user-select:none;-webkit-user-select:none}
  .hist-nome{font-size:15px;color:var(--text);flex:1}
  .hist-medidas{font-size:15px;color:var(--accent);white-space:nowrap;min-width:90px;text-align:right}
  /* touch-action APENAS no handle para não bloquear scroll */
  .hist-handle{width:24px;display:flex;align-items:center;justify-content:center;cursor:grab;color:var(--border2);font-size:11px;border-left:1px solid var(--border);flex-shrink:0;touch-action:none;user-select:none;-webkit-user-select:none;padding:0 2px}
  .hist-handle:active{cursor:grabbing;color:var(--accent)}

  /* MENU EXCLUIR */
  #deleteMenu{position:fixed;bottom:0;left:0;right:0;z-index:300;background:var(--bg2);border-top:1px solid var(--border2);border-radius:20px 20px 0 0;padding:20px 16px 36px;display:none;flex-direction:column;gap:10px;box-shadow:0 -8px 40px #00000070;transform:translateY(100%);transition:transform .25s ease}
  #deleteMenu.show{display:flex;transform:translateY(0)}
  .delete-label{font-size:13px;color:var(--text2);text-align:center;margin-bottom:4px}
  .delete-nome{font-size:17px;color:var(--text);text-align:center;font-weight:bold;margin-bottom:8px}
  .btn-excluir{background:#e05050;color:#fff;border:none;border-radius:12px;padding:16px;font-size:17px;font-weight:bold;cursor:pointer;font-family:Georgia,serif}
  .btn-cancelar-del{background:transparent;color:var(--text2);border:1px solid var(--border2);border-radius:12px;padding:14px;font-size:16px;cursor:pointer;font-family:Georgia,serif}
  #deleteOverlay{position:fixed;inset:0;z-index:299;display:none;background:#00000055}
  #deleteOverlay.show{display:block}

  /* FAB */
  #fab{position:fixed;bottom:26px;right:18px;z-index:50;width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;cursor:pointer;font-size:26px;color:#1a1610;box-shadow:0 4px 20px #00000060;display:none;align-items:center;justify-content:center;transition:transform .25s}
  #fab.show{display:flex}
  #fab.open{transform:rotate(45deg)}
  #fabMenu{position:fixed;bottom:90px;right:18px;z-index:49;display:flex;flex-direction:column;gap:10px;align-items:flex-end;pointer-events:none;opacity:0;transition:opacity .2s,transform .2s;transform:translateY(10px)}
  #fabMenu.open{pointer-events:all;opacity:1;transform:translateY(0)}
  .fab-option{display:flex;align-items:center;gap:10px;background:var(--card-bg);border-radius:50px;padding:10px 18px 10px 14px;cursor:pointer;border:1px solid;font-family:Georgia,serif;font-size:16px;box-shadow:0 4px 16px #00000050;transition:transform .15s;color:var(--text)}
  .fab-option:hover{transform:scale(1.04)}
  #fabPorta{border-color:#00ff6644}
  #fabPorta .fab-emoji{filter:drop-shadow(0 0 6px #00ff66aa);font-size:20px}
  #fabJanela{border-color:#00aaff44}
  #fabJanela .fab-emoji{filter:drop-shadow(0 0 6px #00aaffaa);font-size:20px}

  /* MODAL EDIÇÃO */
  .modal-overlay{position:fixed;inset:0;background:#00000088;z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
  .modal-overlay.show{display:flex}
  .modal{background:var(--card-bg);border:1px solid var(--border2);border-radius:20px;padding:24px 20px;width:100%;max-width:420px}
  .modal-title{font-size:19px;color:var(--accent);margin-bottom:18px}
  .modal label{display:block;font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px}
  .modal input{width:100%;background:var(--input-bg);border:1px solid var(--border2);border-radius:10px;padding:13px 14px;color:var(--text);font-size:15px;font-family:Georgia,serif;outline:none;margin-bottom:14px}
  .modal-row{display:flex;gap:12px}
  .modal-row>div{flex:1}
  .modal-btns{display:flex;gap:10px;margin-top:4px}
  .modal-save{flex:1;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#1a1610;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:bold;cursor:pointer;font-family:Georgia,serif}
  .modal-cancel{background:transparent;color:var(--text2);border:1px solid var(--border2);border-radius:10px;padding:13px 18px;cursor:pointer;font-family:Georgia,serif}

  /* FORM */
  .form-card{background:var(--card-bg);border:1px solid var(--border2);border-radius:20px;padding:26px 22px}
  .form-title{font-size:23px;color:var(--accent);margin-bottom:4px}
  .form-sub{font-size:13px;color:var(--text2);margin-bottom:22px}
  .field-group{margin-bottom:18px}
  .row-group{display:flex;gap:12px;margin-bottom:18px}
  .row-group .field-group{margin-bottom:0;flex:1}
  .row-group .field-group.wide{flex:2}
  label{display:block;font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:7px}
  input{width:100%;background:var(--input-bg);border:1px solid var(--border2);border-radius:12px;padding:15px 16px;color:var(--text);font-size:16px;font-family:Georgia,serif;outline:none;transition:border-color .2s,box-shadow .2s}
  input:focus{border-color:var(--accent);box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 15%,transparent)}
  .btn-save{width:100%;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#1a1610;border:none;border-radius:12px;padding:17px;font-size:17px;font-weight:bold;cursor:pointer;margin-top:4px;font-family:Georgia,serif}
  .btn-save:disabled{opacity:.4;cursor:not-allowed}
  .btn-save.done{background:linear-gradient(135deg,#5a9e6e,#3a7a50)}



  /* PAINEL SAÍDAS */
  #saidasOverlay{position:fixed;inset:0;z-index:299;display:none;background:#00000066}
  #saidasOverlay.show{display:block}
  #saidasPanel{position:fixed;top:0;right:-100%;width:100%;max-width:420px;height:100%;z-index:300;background:var(--bg2);border-left:1px solid var(--border2);display:flex;flex-direction:column;transition:right .3s ease;box-shadow:-8px 0 32px #00000060}
  #saidasPanel.show{right:0}
  .saidas-header{padding:16px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg2)}
  .saidas-title{font-size:16px;color:var(--accent);font-weight:bold;letter-spacing:1px}
  .saidas-list{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:8px}
  .saida-item{background:var(--bg3);border:1px solid #e0505022;border-radius:10px;padding:12px 14px;transition:border-color .2s,box-shadow .2s,transform .15s}
  .saida-item.dragging{opacity:1 !important;border-color:var(--accent) !important;box-shadow:0 0 18px color-mix(in srgb,var(--accent) 40%,transparent),0 4px 24px #00000060 !important;transform:scale(1.02);background:var(--bg2) !important;z-index:10}
  .saida-item.drag-over{border-color:var(--accent);border-style:dashed}
  .saida-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
  .saida-nome{font-size:14px;color:var(--text);font-weight:bold}
  .saida-data{font-size:11px;color:var(--text2)}
  .saida-qtd{font-size:13px;color:#e05050;font-weight:bold}
  .saidas-footer{padding:14px;border-top:1px solid var(--border);display:flex;gap:10px}
  .btn-share{flex:1;background:linear-gradient(135deg,#2a9a50,#1a7038);color:#fff;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:bold;cursor:pointer;font-family:Georgia,serif}
  .btn-clear-saidas{background:transparent;color:var(--text2);border:1px solid var(--border2);border-radius:10px;padding:13px 16px;font-size:14px;cursor:pointer;font-family:Georgia,serif}
  .saidas-vazio{text-align:center;color:var(--text2);font-size:14px;margin-top:40px}
  /* MENU MOVIMENTAÇÃO */
  .move-nome{font-size:16px;color:var(--text);font-weight:bold;text-align:center}
  .move-saldo{font-size:13px;color:var(--text2);text-align:center;margin-top:-8px}
  .move-input-row{display:flex;align-items:center;gap:10px}
  .move-input-row input{flex:1;background:var(--input-bg);border:1px solid var(--border2);border-radius:12px;padding:16px;color:var(--text);font-size:22px;font-family:Georgia,serif;outline:none;text-align:center;font-weight:bold}
  .move-input-row input:focus{border-color:var(--accent)}
  .move-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .btn-entrada{background:linear-gradient(135deg,#2a9a50,#1a7038);color:#fff;border:none;border-radius:12px;padding:16px;font-size:17px;font-weight:bold;cursor:pointer;font-family:Georgia,serif}
  .btn-saida{background:linear-gradient(135deg,#e05050,#a02020);color:#fff;border:none;border-radius:12px;padding:16px;font-size:17px;font-weight:bold;cursor:pointer;font-family:Georgia,serif}
  .btn-fechar-move{background:transparent;color:var(--text2);border:1px solid var(--border2);border-radius:12px;padding:13px;font-size:15px;cursor:pointer;font-family:Georgia,serif;grid-column:1/-1}
  .move-feedback{font-size:14px;text-align:center;min-height:20px;font-weight:bold}

  .hist-item.flash-blue {
    border-color: #00aaff99 !important;
    background: linear-gradient(135deg, #00aaff18, #0066ff0a) !important;
    box-shadow: 0 0 12px #00aaff44;
    transition: border-color 0.3s, background 0.3s, box-shadow 0.3s;
  }
  #dragGhost{position:fixed;pointer-events:none;z-index:9999;background:var(--bg2);border:1px solid var(--accent);border-radius:10px;padding:12px 14px;display:none;align-items:center;gap:12px;box-shadow:0 8px 32px #00000080;opacity:.95;min-width:200px}
  ::-webkit-scrollbar{width:5px}
  ::-webkit-scrollbar-track{background:var(--bg)}
  ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<header id="mainHeader">
  <div class="header-inner">
    <button id="btnVoltar" onclick="voltar()">&#8249; Voltar</button>
    <div id="headerName" class="header-name">Estoque JL</div>
    <button id="btnTema" onclick="toggleTemaPanel(event)">🎨</button>
    <button id="btnSaidas" onclick="abrirSaidas()" title="Ver Saídas" style="background:transparent;border:1px solid var(--border2);color:var(--text2);border-radius:8px;padding:6px 10px;cursor:pointer;font-size:15px;flex-shrink:0;display:none">📤</button>
    <button id="btnPDF" onclick="exportarPDF()" title="Exportar PDF" style="background:transparent;border:1px solid var(--border2);color:var(--text2);border-radius:8px;padding:6px 10px;cursor:pointer;font-size:15px;flex-shrink:0;display:none">📄</button>
  </div>
</header>

<div id="temaPanel">
  <div class="tema-opt active" id="t-escuro" onclick="setTema('')"><div class="tema-dot" style="background:#c8a96e;border:2px solid #8b6e3f"></div>Escuro</div>
  <div class="tema-opt" id="t-claro" onclick="setTema('theme-claro')"><div class="tema-dot" style="background:#e8dfc8;border:2px solid #8b5e2a"></div>Claro</div>
  <div class="tema-opt" id="t-floresta" onclick="setTema('theme-floresta')"><div class="tema-dot" style="background:#4eb86a;border:2px solid #2a8a48"></div>Floresta</div>
  <div class="tema-opt" id="t-noturno" onclick="setTema('theme-noturno')"><div class="tema-dot" style="background:#6e8ac8;border:2px solid #4a66a8"></div>Noturno</div>
</div>

<!-- MENU EXCLUIR (bottom sheet) -->
<div id="deleteOverlay" onclick="fecharDeleteMenu()"></div>
<div id="deleteMenu">
  <div class="delete-label">Excluir lançamento?</div>
  <div class="delete-nome" id="deleteNome"></div>
  <button class="btn-excluir" onclick="confirmarDelete()">Excluir</button>
  <button class="btn-cancelar-del" onclick="fecharDeleteMenu()">Voltar</button>
</div>

<!-- PAINEL SAÍDAS -->
<div id="saidasOverlay" onclick="fecharSaidas()"></div>
<div id="saidasPanel">
  <div class="saidas-header">
    <div>
      <span class="saidas-title">📤 SAÍDAS</span>
      <span id="saidasDataLabel" style="font-size:11px;color:var(--text2);margin-left:8px"></span>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <span id="saidasNomeLabel" style="font-size:13px;color:var(--text2)"></span>
      <button onclick="fecharSaidas()" style="background:transparent;border:none;color:var(--text2);font-size:20px;cursor:pointer;padding:4px">✕</button>
    </div>
  </div>
  <div style="padding:10px 14px 0;border-bottom:1px solid var(--border)">
    <input id="inputMotorista" placeholder="🚛  Nome do motorista…" style="width:100%;background:var(--input-bg);border:1px solid var(--border2);border-radius:10px;padding:11px 14px;color:var(--text);font-size:15px;font-family:Georgia,serif;outline:none;margin-bottom:10px"/>
  </div>
  <div class="saidas-list" id="saidasList"></div>
  <div class="saidas-footer">
    <button class="btn-share" onclick="compartilharSaidas()">📄 Exportar PDF</button>
    <button class="btn-clear-saidas" onclick="limparSaidas()">Limpar</button>
  </div>
</div>

<!-- MENU MOVIMENTAÇÃO -->
<div id="moveOverlay2" onclick="fecharMoveMenu()" style="position:fixed;inset:0;z-index:299;display:none;background:#00000055"></div>
<div id="moveMenu" style="position:fixed;bottom:0;left:0;right:0;z-index:300;background:var(--bg2);border-top:1px solid var(--border2);border-radius:20px 20px 0 0;padding:20px 16px 36px;display:none;flex-direction:column;gap:14px;box-shadow:0 -8px 40px #00000070;transform:translateY(100%);transition:transform .25s ease">

<script>
const CORES=[["#c8a96e","#8b6e3f"],["#7eb8a4","#3d7a6a"],["#e08060","#a04020"],["#9b7bb8","#6a4a8a"],["#6fa3d1","#3a6fa0"],["#d4a060","#9a6020"]];
const TEMAS={'':'t-escuro','theme-claro':'t-claro','theme-floresta':'t-floresta','theme-noturno':'t-noturno'};
let marceneiros=[],items=[],selectedId=null,tipoAtual=null,viewAtual="home",editingId=null,fabOpen=false,deleteId=null;

// Scroll header
let lastScroll=0;
window.addEventListener("scroll",()=>{
  const cur=window.scrollY;
  document.getElementById("mainHeader").classList.toggle("hidden",cur>lastScroll&&cur>60);
  lastScroll=cur;
},{passive:true});

document.addEventListener("click",e=>{
  if(fabOpen&&!e.target.closest("#fab")&&!e.target.closest("#fabMenu"))closeFab();
  if(!e.target.closest("#btnTema")&&!e.target.closest("#temaPanel"))fecharTemaPanel();
});

// TEMAS
function toggleTemaPanel(e){e.stopPropagation();document.getElementById("temaPanel").classList.toggle("show")}
function fecharTemaPanel(){document.getElementById("temaPanel").classList.remove("show")}
function setTema(tema){
  document.body.className=tema;
  localStorage.setItem("tema",tema);
  Object.keys(TEMAS).forEach(k=>document.getElementById(TEMAS[k]).classList.toggle("active",k===tema));
  fecharTemaPanel();
}
setTema(localStorage.getItem("tema")||'');

function salvarDados(){localStorage.setItem("marceneiros",JSON.stringify(marceneiros));localStorage.setItem("items",JSON.stringify(items))}
function carregarDados(){
  try{marceneiros=JSON.parse(localStorage.getItem("marceneiros"))||defaultM()}catch{marceneiros=defaultM()}
  try{items=JSON.parse(localStorage.getItem("items"))||[]}catch{items=[]}
}
function defaultM(){return[{id:1,nome:"Carlos Silva"},{id:2,nome:"João Pereira"},{id:3,nome:"Marcos Oliveira"}]}

function irView(view){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById("sec"+view.charAt(0).toUpperCase()+view.slice(1)).classList.add("active");
  viewAtual=view;
  window.scrollTo(0,0);
  document.getElementById("mainHeader").classList.remove("hidden");
  document.getElementById("headerName").textContent=view==="home"?"Estoque JL":(getMarceneiro()?.nome||"");
  document.getElementById("btnVoltar").className=view!=="home"?"show":"";
  document.getElementById("fab").className=view==="tipo"?"show":"";
  document.getElementById("btnPDF").style.display=view==="tipo"?"inline-flex":"none";
  document.getElementById("btnSaidas").style.display=view==="tipo"?"inline-flex":"none";
  closeFab();
}
function voltar(){
  if(viewAtual==="form")irView("tipo");
  else if(viewAtual==="tipo")irView("home");
  else irView("home");
}
function getMarceneiro(){return marceneiros.find(m=>m.id===selectedId)}

// FAB
function toggleFab(){fabOpen?closeFab():openFab()}
function openFab(){fabOpen=true;document.getElementById("fab").classList.add("open");document.getElementById("fabMenu").classList.add("open")}
function closeFab(){fabOpen=false;document.getElementById("fab").classList.remove("open");document.getElementById("fabMenu").classList.remove("open")}
function fabIrForm(tipo){closeFab();irForm(tipo)}

// HOME
function renderHome(){
  const grid=document.getElementById("gridMarceneiros");grid.innerHTML="";
  // Totais gerais — soma das quantidades
  const tp=items.filter(i=>i.categoria==="porta").reduce((s,i)=>s+Number(i.qtd),0);
  const tj=items.filter(i=>i.categoria==="janela").reduce((s,i)=>s+Number(i.qtd),0);
  const elP=document.getElementById("totalPortasGeral");
  const elJ=document.getElementById("totalJanelasGeral");
  if(elP)elP.textContent=tp;
  if(elJ)elJ.textContent=tj;

  marceneiros.forEach(m=>{
    const[light,dark]=CORES[m.id%CORES.length];
    const p=items.filter(i=>i.marceneiroId===m.id&&i.categoria==="porta").reduce((s,i)=>s+Number(i.qtd),0);
    const j=items.filter(i=>i.marceneiroId===m.id&&i.categoria==="janela").reduce((s,i)=>s+Number(i.qtd),0);
    const div=document.createElement("div");div.className="marc-card";
    div.style.cssText=`background:linear-gradient(135deg,${light}18 0%,${dark}0a 100%);border-color:${light}44`;
    div.innerHTML=`
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div class="marc-nome" style="margin:0;flex:1">${m.nome}</div>
        <div style="display:flex;gap:8px">
          <button class="btn-edit-marc" style="background:transparent;border:1px solid var(--border2);color:var(--text2);border-radius:8px;padding:6px 10px;cursor:pointer;font-size:13px;transition:all .2s;white-space:nowrap">✏️</button>
          <button class="btn-del-marc" style="background:transparent;border:1px solid #e0505033;color:#e05050;border-radius:8px;padding:6px 10px;cursor:pointer;font-size:13px;transition:all .2s;white-space:nowrap">🗑</button>
        </div>
      </div>
      <div class="marc-stats">
        <div class="marc-stat">🚪 <strong>${p}</strong> porta${p!==1?"s":""}</div>
        <span style="color:var(--border2)">·</span>
        <div class="marc-stat">🪟 <strong>${j}</strong> janela${j!==1?"s":""}</div>
      </div>`;

    let editReady=false, delReady=false, editTimer=null, delTimer=null;
    const btnEdit = div.querySelector(".btn-edit-marc");
    const btnDel  = div.querySelector(".btn-del-marc");
    const mId = m.id;
    const mNome = m.nome;

    btnEdit.addEventListener("click", e => {
      e.stopPropagation();
      if(!editReady){
        editReady=true;
        btnEdit.textContent="✓ Editar";
        btnEdit.style.borderColor="var(--accent)";
        btnEdit.style.color="var(--accent)";
        editTimer=setTimeout(()=>{editReady=false;btnEdit.textContent="✏️";btnEdit.style.borderColor="";btnEdit.style.color="";},2000);
      } else {
        clearTimeout(editTimer);editReady=false;
        btnEdit.textContent="✏️";btnEdit.style.borderColor="";btnEdit.style.color="";
        editarMarceneiro(mId);
      }
    });

    btnDel.addEventListener("click", e => {
      e.stopPropagation();
      if(!delReady){
        delReady=true;
        btnDel.textContent="✓ Excluir";
        btnDel.style.background="#e0505022";
        btnDel.style.borderColor="#e05050";
        delTimer=setTimeout(()=>{delReady=false;btnDel.textContent="🗑";btnDel.style.background="";btnDel.style.borderColor="";},2000);
      } else {
        clearTimeout(delTimer);delReady=false;
        btnDel.textContent="🗑";btnDel.style.background="";btnDel.style.borderColor="";
        abrirDeleteMarceneiro(mId, mNome);
      }
    });

    div.addEventListener("click", () => selecionarMarceneiro(mId));

    grid.appendChild(div);
  });
}
function toggleAddForm(){
  const c=document.getElementById("addCard");c.classList.toggle("show");
  if(c.classList.contains("show"))document.getElementById("inputNovo").focus();
  else document.getElementById("inputNovo").value="";
}
function addMarceneiro(){
  const inp=document.getElementById("inputNovo");const nome=inp.value.trim();if(!nome)return;
  marceneiros.push({id:Date.now(),nome});salvarDados();inp.value="";
  document.getElementById("addCard").classList.remove("show");renderHome();
}
function removeMarceneiro(id){
  if(!confirm("Remover este marceneiro e todos os lançamentos?"))return;
  marceneiros=marceneiros.filter(m=>m.id!==id);items=items.filter(i=>i.marceneiroId!==id);
  salvarDados();renderHome();
}

// HISTÓRICO
let filtroCategoria = null;
function selecionarMarceneiro(id){selectedId=id;filtroCategoria=null;renderHistorico();irView("tipo")}
function renderHistorico(){
  const m=getMarceneiro();const div=document.getElementById("historico");
  const todos=items.filter(i=>i.marceneiroId===m.id);
  const itens=filtroCategoria?todos.filter(i=>i.categoria===filtroCategoria):todos;
  if(!todos.length){div.innerHTML=`<p style="color:var(--text2);font-size:14px;margin-top:30px;text-align:center">Nenhum lançamento.<br>Use o botão + para adicionar.</p>`;return}
  const totalQtd=itens.reduce((s,i)=>s+Number(i.qtd),0);
  const filtroInfo=filtroCategoria?`<span style="font-size:11px;color:var(--accent);margin-left:8px;cursor:pointer" onclick="filtroCategoria=null;renderHistorico()">${filtroCategoria==="porta"?"🚪":"🪟"} ✕</span>`:"";
  div.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px">
    <div class="hist-title" style="margin:0">Lançamentos${filtroInfo}</div>
    <div style="display:flex;align-items:center;gap:6px;padding-right:28px"><span style="font-size:11px;color:var(--text2);letter-spacing:1px">TOTAL</span><span style="font-size:22px;font-weight:900;color:var(--accent)">${totalQtd}</span><span style="font-size:12px;color:var(--text2)">un</span></div>
  </div><div class="hist-list" id="histList"></div>`;
  const list=document.getElementById("histList");
  itens.forEach(item=>buildHistItem(item,list));
}

// DOUBLE TAP
function buildHistItem(item,list){
  const nome=item.tipo||(item.categoria==="porta"?"Porta":"Janela");
  const medidas=`<span style="font-size:20px;font-weight:900;letter-spacing:-0.5px">${item.qtd}</span><span style="font-size:15px;font-weight:300;color:var(--text2);margin:0 4px">|</span><span style="font-size:20px;font-weight:900;letter-spacing:-0.5px">${item.largura}</span><span style="font-size:12px;font-weight:400">cm</span>`;
  const el=document.createElement("div");el.className="hist-item";el.dataset.id=item.id;
  const emoji = item.categoria === "porta" ? "🚪" : "🪟";
  el.innerHTML=`<span class="hist-emoji">${emoji}</span><div class="hist-body"><span class="hist-nome">${nome}</span><span class="hist-medidas" onclick="event.stopPropagation();abrirMoveMenu(${item.id})" style="cursor:pointer;padding:4px 8px;border-radius:8px;border:1px solid var(--border2)">${medidas}</span></div><div class="hist-handle">⋮⋮</div>`;
  // Filtro ao clicar no emoji
  el.querySelector(".hist-emoji").addEventListener("click", e => {
    e.stopPropagation();
    filtroCategoria = filtroCategoria === item.categoria ? null : item.categoria;
    renderHistorico();
  });

  const body=el.querySelector(".hist-body");
  const handle=el.querySelector(".hist-handle");

  // LONG PRESS → menu excluir
  let lpTimer=null,lpActive=false;
  const startLP=()=>{
    lpActive=false;
    lpTimer=setTimeout(()=>{lpActive=true;abrirDeleteMenu(item.id,nome)},700);
  };
  const cancelLP=()=>{if(lpTimer){clearTimeout(lpTimer);lpTimer=null}};

  body.addEventListener("mousedown",startLP);
  body.addEventListener("mouseup",cancelLP);
  body.addEventListener("mouseleave",cancelLP);
  body.addEventListener("touchstart",startLP,{passive:true});
  body.addEventListener("touchmove",cancelLP,{passive:true});
  body.addEventListener("touchcancel",cancelLP,{passive:true});
  body.addEventListener("touchend",()=>{cancelLP();lpActive=false;},{passive:true});

  // DOUBLE TAP — usando timestamp, mais confiável no mobile
  let lastTap=0;
  body.addEventListener("touchend",e=>{
    if(lpActive)return;
    const now=Date.now();
    if(now-lastTap<350){
      e.preventDefault();
      abrirModal(item.id);
      lastTap=0;
    } else {
      lastTap=now;
    }
  },{passive:false});

  // Double click desktop
  body.addEventListener("dblclick",()=>abrirModal(item.id));

  // DRAG HANDLE — touch-action:none só aqui
  handle.addEventListener("mousedown",e=>startDrag(e,item.id,el));
  handle.addEventListener("touchstart",e=>{e.preventDefault();startDrag(e.touches[0],item.id,el)},{passive:false});

  list.appendChild(el);
}

// DELETE MENU
function abrirDeleteMenu(id,nome){
  deleteId=id;
  document.getElementById("deleteNome").textContent=nome;
  document.getElementById("deleteOverlay").classList.add("show");
  document.getElementById("deleteMenu").classList.add("show");
}
function fecharDeleteMenu(){
  deleteId=null;
  deleteMarcId=null;
  window._deletandoMarc=false;
  document.getElementById("deleteOverlay").classList.remove("show");
  document.getElementById("deleteMenu").classList.remove("show");
}
function confirmarDelete(){
  if(window._deletandoMarc && deleteMarcId){
    window._deletandoMarc = false;
    marceneiros = marceneiros.filter(m => m.id !== deleteMarcId);
    items = items.filter(i => i.marceneiroId !== deleteMarcId);
    saidas = saidas.filter(s => s.marceneiroId !== deleteMarcId);
    salvarDados(); salvarSaidas(); fecharDeleteMenu(); renderHome();
    deleteMarcId = null; return;
  }
  if(!deleteId)return;
  items=items.filter(i=>i.id!==deleteId);
  salvarDados();fecharDeleteMenu();renderHistorico();renderHome();
}


// DRAG SAÍDAS
let dragSaidaSrcId = null;
function startSaidaDrag(e, id, el) {
  dragSaidaSrcId = id; el.classList.add("dragging");
  const h = el.getBoundingClientRect().height / 2;
  const onMove = (ex, ey) => {
    document.querySelectorAll("#saidasList .saida-item").forEach(r => r.classList.remove("drag-over"));
    const t = getSaidaTarget(ey); if (t && t !== el) t.classList.add("drag-over");
  };
  const onEnd = (ey) => {
    el.classList.remove("dragging");
    document.querySelectorAll("#saidasList .saida-item").forEach(r => r.classList.remove("drag-over"));
    window.removeEventListener("mousemove", mmH); window.removeEventListener("mouseup", muH);
    window.removeEventListener("touchmove", tmH); window.removeEventListener("touchend", teH);
    const t = getSaidaTarget(ey);
    if (t && t.dataset.sid && t.dataset.sid !== String(dragSaidaSrcId)) reorderSaidas(dragSaidaSrcId, parseInt(t.dataset.sid));
    dragSaidaSrcId = null;
  };
  const mmH = ev => onMove(ev.clientX, ev.clientY);
  const muH = ev => onEnd(ev.clientY);
  const tmH = ev => { ev.preventDefault(); onMove(ev.touches[0].clientX, ev.touches[0].clientY); };
  const teH = ev => onEnd(ev.changedTouches[0].clientY);
  window.addEventListener("mousemove", mmH); window.addEventListener("mouseup", muH);
  window.addEventListener("touchmove", tmH, { passive: false }); window.addEventListener("touchend", teH);
}
function getSaidaTarget(y) {
  for (const el of document.querySelectorAll("#saidasList .saida-item:not(.dragging)")) {
    const r = el.getBoundingClientRect(); if (y >= r.top && y <= r.bottom) return el;
  }
  return null;
}
function reorderSaidas(srcId, tgtId) {
  const m = getMarceneiro();
  const mS = saidas.filter(s => s.marceneiroId === m.id);
  const oS = saidas.filter(s => s.marceneiroId !== m.id);
  const si = mS.findIndex(s => s.id === srcId), ti = mS.findIndex(s => s.id === tgtId);
  if (si === -1 || ti === -1) return;
  const [mv] = mS.splice(si, 1); mS.splice(ti, 0, mv);
  saidas = [...oS, ...mS]; salvarSaidas(); renderSaidas();
}

// DRAG REORDER
let dragSrcId=null;
function startDrag(e,id,el){
  dragSrcId=id;el.classList.add("dragging");
  const ghost=document.getElementById("dragGhost");
  const item=items.find(i=>i.id===id);
  document.getElementById("ghostNome").textContent=item.tipo||(item.categoria==="porta"?"Porta":"Janela");
  document.getElementById("ghostMed").textContent=`${item.qtd} · ${item.largura}cm`;
  ghost.style.display="flex";
  const h=el.getBoundingClientRect().height/2;
  const onMove=(ex,ey)=>{
    ghost.style.left="14px";ghost.style.top=(ey-h)+"px";
    ghost.style.width=(document.getElementById("histList")?.offsetWidth||300)+"px";
    document.querySelectorAll(".hist-item").forEach(r=>r.classList.remove("drag-over"));
    const t=getTarget(ey);if(t&&t!==el)t.classList.add("drag-over");
  };
  const onEnd=(ey)=>{
    ghost.style.display="none";el.classList.remove("dragging");
    document.querySelectorAll(".hist-item").forEach(r=>r.classList.remove("drag-over"));
    window.removeEventListener("mousemove",mmH);window.removeEventListener("mouseup",muH);
    window.removeEventListener("touchmove",tmH);window.removeEventListener("touchend",teH);
    const t=getTarget(ey);
    if(t&&t.dataset.id&&t.dataset.id!==String(dragSrcId))reorderItems(dragSrcId,parseInt(t.dataset.id));
    dragSrcId=null;
  };
  const mmH=ev=>onMove(ev.clientX,ev.clientY);
  const muH=ev=>onEnd(ev.clientY);
  const tmH=ev=>{ev.preventDefault();onMove(ev.touches[0].clientX,ev.touches[0].clientY)};
  const teH=ev=>onEnd(ev.changedTouches[0].clientY);
  window.addEventListener("mousemove",mmH);window.addEventListener("mouseup",muH);
  window.addEventListener("touchmove",tmH,{passive:false});window.addEventListener("touchend",teH);
}
function getTarget(y){
  for(const el of document.querySelectorAll(".hist-item:not(.dragging)")){
    const r=el.getBoundingClientRect();if(y>=r.top&&y<=r.bottom)return el;
  }
  return null;
}
function reorderItems(srcId,tgtId){
  const m=getMarceneiro();
  const mI=items.filter(i=>i.marceneiroId===m.id);const oI=items.filter(i=>i.marceneiroId!==m.id);
  const si=mI.findIndex(i=>i.id===srcId),ti=mI.findIndex(i=>i.id===tgtId);
  if(si===-1||ti===-1)return;
  const[mv]=mI.splice(si,1);mI.splice(ti,0,mv);
  items=[...oI,...mI];salvarDados();renderHistorico();renderHome();
}

  document.getElementById("eQtd").value=item.qtd;

}
function fecharModal(){document.getElementById("modalOverlay").classList.remove("show");editingId=null}
function salvarEdicao(){

document.getElementById("modalOverlay").addEventListener("click",e=>{if(e.target===document.getElementById("modalOverlay"))fecharModal()});

// FORM

function flashCard(id) {
  const el = document.querySelector(`.hist-item[data-id="${id}"]`);
  if (!el) return;
  el.classList.add("flash-blue");
  setTimeout(() => el.classList.remove("flash-blue"), 5000);
}

// SAÍDAS
let saidas = [];
function carregarSaidas() {
  try { saidas = JSON.parse(localStorage.getItem("saidas")) || []; } catch { saidas = []; }
}
function salvarSaidas() { localStorage.setItem("saidas", JSON.stringify(saidas)); }

function registrarSaida(marceneiroId, nome, largura, qtd) {
  saidas.push({
    id: Date.now(), marceneiroId,
    nome, largura, qtd,
    data: new Date().toLocaleDateString("pt-BR"),
    hora: new Date().toLocaleTimeString("pt-BR", {hour:"2-digit",minute:"2-digit"})
  });
  salvarSaidas();
}

function abrirSaidas() {
  const m = getMarceneiro(); if (!m) return;
  document.getElementById("saidasNomeLabel").textContent = m.nome;
  document.getElementById("saidasDataLabel").textContent = new Date().toLocaleDateString("pt-BR");
  renderSaidas();
  document.getElementById("saidasOverlay").classList.add("show");
  document.getElementById("saidasPanel").classList.add("show");
}

function fecharSaidas() {
  document.getElementById("saidasOverlay").classList.remove("show");
  document.getElementById("saidasPanel").classList.remove("show");
}

function renderSaidas() {
  const m = getMarceneiro();
  const list = document.getElementById("saidasList");
  const raw = saidas.filter(s => s.marceneiroId === m.id);
  if (!raw.length) {
    list.innerHTML = '<div class="saidas-vazio">Nenhuma saída registrada.</div>';
    return;
  }

  // Agrupar por nome + largura
  const grupos = {};
  raw.forEach(s => {
    const chave = s.nome + "||" + s.largura;
    if (grupos[chave]) {
      grupos[chave].qtd += Number(s.qtd);
    } else {
      grupos[chave] = { ...s, qtd: Number(s.qtd) };
    }
  });
  const agrupados = Object.values(grupos).reverse();

  list.innerHTML = "";
  agrupados.forEach((s, idx) => {
    const div = document.createElement("div");
    div.className = "saida-item";
    div.style.cssText = "display:flex;align-items:center;overflow:hidden";
    div.dataset.sid = s.id;
    div.innerHTML = `
      <div class="saida-top" style="flex:1;padding:12px 0 12px 0">
        <div style="display:flex;align-items:center;gap:0;width:100%;flex-wrap:wrap">
          <span style="font-size:18px;font-weight:900;flex-shrink:0;min-width:52px;display:inline-block;text-align:right">${s.qtd}</span>
          <span style="font-size:13px;font-weight:300;color:var(--text2);margin:0 4px;flex-shrink:0">|</span>
          <span style="font-size:18px;font-weight:900;color:var(--accent);flex-shrink:0">${s.largura}</span><span style="font-size:11px;font-weight:400;color:var(--accent);flex-shrink:0;margin-right:8px">cm</span>
          <span style="color:var(--text2);font-size:13px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${s.nome}</span>
        </div>
      </div>
      <div class="saida-handle" style="width:24px;min-height:44px;display:flex;align-items:center;justify-content:center;cursor:grab;color:var(--border2);font-size:11px;border-left:1px solid var(--border);flex-shrink:0;touch-action:none;user-select:none;padding:0 2px">⋮⋮</div>`;
    const sh = div.querySelector(".saida-handle");
    sh.addEventListener("mousedown", e => startSaidaDrag(e, s.id, div));
    sh.addEventListener("touchstart", e => { e.preventDefault(); startSaidaDrag(e.touches[0], s.id, div); }, { passive: false });
    list.appendChild(div);
  });

  // Total
  const totalSaidas = agrupados.reduce((a,s) => a + Number(s.qtd), 0);
  const totalDiv = document.createElement("div");
  totalDiv.style.cssText = "display:flex;justify-content:flex-end;align-items:center;gap:8px;padding:10px 4px 4px;border-top:1px solid var(--border);margin-top:4px";
  totalDiv.innerHTML = `<span style="font-size:12px;color:var(--text2);letter-spacing:1px">TOTAL</span><span style="font-size:24px;font-weight:900;color:var(--accent)">${totalSaidas}</span><span style="font-size:13px;color:var(--text2)">un</span>`;
  list.appendChild(totalDiv);
}

function limparSaidas() {
  const m = getMarceneiro(); if (!m) return;
  if (!confirm("Limpar todas as saídas de " + m.nome + "?")) return;
  saidas = saidas.filter(s => s.marceneiroId !== m.id);
  salvarSaidas(); renderSaidas();
  document.getElementById("inputMotorista").value = "";
}

function compartilharSaidas() {
  const m = getMarceneiro(); if (!m) return;
  const mSaidas = saidas.filter(s => s.marceneiroId === m.id);
  if (!mSaidas.length) { alert("Nenhuma saída registrada."); return; }

  const { jsPDF } = window.jspdf;
  const motorista = document.getElementById("inputMotorista").value.trim();
  const hoje = new Date().toLocaleDateString("pt-BR");
  const total = mSaidas.reduce((a,s) => a + Number(s.qtd), 0);

  const doc = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4" });
  const W = doc.internal.pageSize.getWidth();
  const margin = 20;
  const contentW = W - margin * 2;

  // Fundo branco
  doc.setFillColor(255, 255, 255);
  doc.rect(0, 0, W, 297, "F");

  // Cabeçalho
  doc.setFillColor(245, 242, 235);
  doc.roundedRect(margin, 8, contentW, motorista ? 30 : 22, 2, 2, "F");
  doc.setDrawColor(180, 150, 80);
  doc.setLineWidth(0.3);
  doc.roundedRect(margin, 8, contentW, motorista ? 30 : 22, 2, 2, "S");

  doc.setFont("helvetica", "bold");
  doc.setFontSize(15);
  doc.setTextColor(100, 70, 20);
  doc.text("SAIDAS — " + m.nome, margin + 6, 18);
  doc.setFont("helvetica", "normal");
  doc.setFontSize(9);
  doc.setTextColor(140, 110, 60);
  doc.text(hoje, W - margin - 4, 18, { align: "right" });
  if (motorista) {
    doc.setFont("helvetica", "bold");
    doc.setFontSize(14);
    doc.setTextColor(40, 25, 5);
    doc.text("Motorista: " + motorista, margin + 6, 30);
  }

  const yAposHeader = motorista ? 42 : 34;

  // Total
  doc.setFillColor(245, 242, 235);
  doc.roundedRect(margin, yAposHeader, contentW, 14, 2, 2, "F");
  doc.setDrawColor(180, 150, 80);
  doc.roundedRect(margin, yAposHeader, contentW, 14, 2, 2, "S");
  doc.setFont("helvetica", "normal");
  doc.setFontSize(10);
  doc.setTextColor(140, 110, 60);
  doc.text("TOTAL", margin + 6, yAposHeader + 9);
  doc.setFont("helvetica", "bold");
  doc.setFontSize(16);
  doc.setTextColor(70, 45, 10);
  const totalW = doc.getTextWidth("TOTAL");
  doc.text("  " + total + "un", margin + 6 + totalW, yAposHeader + 9);

  doc.setDrawColor(200, 180, 120);
  doc.setLineWidth(0.2);
  doc.line(margin, yAposHeader + 15, margin + contentW, yAposHeader + 15);

  // Itens
  let y = yAposHeader + 26;
  mSaidas.forEach((s, idx) => {
    if (y > 262) {
      doc.addPage();
      doc.setFillColor(255,255,255); doc.rect(0,0,W,297,"F");
      y = 20;
    }
    doc.setFillColor(idx % 2 === 0 ? 250 : 243, idx % 2 === 0 ? 248 : 241, idx % 2 === 0 ? 242 : 234);
    doc.roundedRect(margin, y - 7, contentW, 20, 2, 2, "F");

    // Coluna fixa: número alinhado à direita, | sempre na mesma posição
    const colQtd = margin + 22; // posição fixa do |
    const colLarg = colQtd + 8;
    const colNome = colLarg + 22;

    doc.setFont("helvetica", "bold");
    doc.setFontSize(18);
    doc.setTextColor(30, 20, 5);
    doc.text(String(s.qtd), colQtd, y + 6, { align: "right" });

    doc.setFont("helvetica", "normal");
    doc.setFontSize(13);
    doc.setTextColor(150, 120, 70);
    doc.text("|", colQtd + 2, y + 6);

    doc.setFont("helvetica", "bold");
    doc.setFontSize(15);
    doc.setTextColor(90, 60, 15);
    doc.text(s.largura + "cm", colLarg, y + 6);

    doc.setFont("helvetica", "normal");
    doc.setFontSize(13);
    doc.setTextColor(80, 60, 30);
    doc.text(s.nome, colNome, y + 6);

    y += 22;
  });

  // Rodapé
  doc.setFont("helvetica", "normal");
  doc.setFontSize(8);
  doc.setTextColor(160, 140, 100);
  doc.text("EstoqueMadeira · " + hoje, W / 2, 290, { align: "center" });

  doc.save(`Saidas_${m.nome.replace(/ /g,"_")}_${hoje.replace(/\//g,"-")}.pdf`);
}

// MOVIMENTAÇÃO
let moveId = null;
function abrirMoveMenu(id) {
  moveId = id;
  const item = items.find(i => i.id === id);
  const nome = item.tipo || (item.categoria === "porta" ? "Porta" : "Janela");
  document.getElementById("moveNome").textContent = nome + "  ·  " + item.largura + "cm";
  document.getElementById("moveSaldo").textContent = "Saldo atual: " + item.qtd;
  document.getElementById("moveQtd").value = "";
  document.getElementById("moveFeedback").textContent = "";
  document.getElementById("moveFeedback").style.color = "var(--accent)";
  document.getElementById("moveOverlay2").style.display="block"; document.getElementById("moveMenu").style.display="flex"; setTimeout(()=>document.getElementById("moveMenu").style.transform="translateY(0)",10);
  document.getElementById("moveMenu").classList.add("show");
  setTimeout(() => document.getElementById("moveQtd").focus(), 300);
}
function fecharMoveMenu() {
  moveId = null;
  document.getElementById("moveOverlay2").style.display="none"; document.getElementById("moveMenu").style.transform="translateY(100%)"; setTimeout(()=>document.getElementById("moveMenu").style.display="none",250);
  document.getElementById("moveMenu").classList.remove("show");
}
function aplicarMove(sinal) {
  const val = parseInt(document.getElementById("moveQtd").value);
  if (!val || val <= 0) {
    document.getElementById("moveFeedback").style.color = "var(--danger)";
    document.getElementById("moveFeedback").textContent = "Digite uma quantidade válida.";
    return;
  }
  const idx = items.findIndex(i => i.id === moveId);
  if (idx === -1) return;
  const antes = items[idx].qtd;
  if (sinal === '+') {
    items[idx].qtd = antes + val;
    document.getElementById("moveFeedback").style.color = "#4eb86a";
    document.getElementById("moveFeedback").textContent = `+${val} → Novo saldo: ${items[idx].qtd}`;
  } else {
    if (val > antes) {
      document.getElementById("moveFeedback").style.color = "var(--danger)";
      document.getElementById("moveFeedback").textContent = `Saldo insuficiente (atual: ${antes})`;
      return;
    }
    items[idx].qtd = antes - val;
    document.getElementById("moveFeedback").style.color = "#e05050";
    document.getElementById("moveFeedback").textContent = `-${val} → Novo saldo: ${items[idx].qtd}`;
    // Registrar saída
    const nomeItem = items[idx].tipo || (items[idx].categoria === "porta" ? "Porta" : "Janela");
    registrarSaida(items[idx].marceneiroId, nomeItem, items[idx].largura, val);
  }
  document.getElementById("moveSaldo").textContent = "Saldo atual: " + items[idx].qtd;
  document.getElementById("moveQtd").value = "";
  salvarDados(); renderHistorico(); renderHome(); setTimeout(()=>flashCard(moveId),50);
}

  doc.roundedRect(margin, 34, contentW, 13, 2, 2, "F");
  doc.setDrawColor(180, 150, 80);
  doc.roundedRect(margin, 34, contentW, 13, 2, 2, "S");

  doc.setFont("helvetica", "normal");
  doc.setFontSize(9);
  doc.setTextColor(130, 100, 50);
  doc.text("TOTAL", margin + 6, 42);
  doc.setFont("helvetica", "bold");

  doc.setTextColor(80, 55, 15);
  doc.text(totalQtd + "un", margin + contentW - 4, 42, { align: "right" });

  doc.setDrawColor(200, 180, 130);

  doc.line(margin, 50, margin + contentW, 50);

  // Linhas dos itens
  let y = 57;

  // Rodapé
